<body>
  <h1> Mostrar e Ocultar um parágrafo </h1>

   <p id="parag"> Lorem ipsum dolor sit amet, consectetur adipisicing elit. Quis assumenda fugit excepturi, consequatur quidem sint beatae? Ullam aut at tempore modi molestiae veniam. Quibusdam beatae suscipit tempora dolores saepe voluptate. </p>

   
   <button id="b1"> Mostrar </button>
   <button id="b2"> Ocultar </button>
  
 <script>
   document.getElementById("b1").addEventListener("click", mostrar)
   document.getElementById("b2").addEventListener("click", ocultar)
 
    function mostrar(){
     let parag = document.getElementById("parag")
     parag.style.display = "block"
    }

    function ocultar(){
     let parag = document.getElementById("parag")
     parag.style.display = "none"
    }
 </script>  
</body>
