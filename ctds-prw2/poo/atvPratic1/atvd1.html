<!DOCTYPE html>
<html lang="pt-BR">
<head>
 <meta charset="UTF-8">
 <title> Atividade Prática 1 - POO em PHP </title>
 <link rel="stylesheet" href="atvd.css">
</head>
<body>
  <h1> Atividade Prática 1 - POO em PHP </h1>

  <form action="atvd1.php" method="post">
   <fieldset>
     <legend> Livrarias GGR - Dados Cadastrais do Livro </legend>
     <label> Título: </label>
     <input type="text" name="titulo" autofocus placeholder="Título do livro"> <br>
     <label> Autor : </label> 
     <input type="text" name="autor" placeholder="Autor do livro"> <br>
     <label> ISBN : </label> 
     <input type="text" name="isbn" placeholder="ISBN do livro"> <br>
     <label> Preço : </label> 
     <input type="number" name="preco" min="0" step="0.01" placeholder="Preço de Venda do livro"> <br> <br>
     <label> Desct : </label> 
     <input type="number" name="desconto" min="0" max="100" step="0.1" placeholder="Desconto de Venda do livro"> <br>

    <button> Cadastrar Livro </button>
   </fieldset>
 
</body>
</html>
